name: Release Windows installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download verified rclone binary
        run: npm run download-rclone

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $tagVersion = '${{ github.ref_name }}'.TrimStart('v')
          if ($packageVersion -ne $tagVersion) {
            throw "Tag v$tagVersion does not match package.json version $packageVersion"
          }

      - name: Run automated tests
        run: npm test

      - name: Build renderer and main process
        run: npm run build

      - name: Build unsigned Windows installer
        run: npx electron-builder --win --publish never

      - name: Verify unsigned installer and update metadata
        shell: pwsh
        run: |
          $installer = Get-ChildItem dist-packaged -Filter 'LabSuite-v*-Setup.exe' | Select-Object -First 1
          if (-not $installer) { throw 'Windows installer was not generated.' }
          if (-not (Test-Path dist-packaged/latest.yml)) { throw 'latest.yml was not generated.' }
          if (-not (Test-Path "$($installer.FullName).blockmap")) { throw 'Installer blockmap was not generated.' }
          $signature = Get-AuthenticodeSignature -LiteralPath $installer.FullName
          if ($signature.Status -ne 'NotSigned') {
            throw "Installer signature is $($signature.Status), expected NotSigned for the personal-use release."
          }

      - name: Create draft GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $installer = Get-ChildItem dist-packaged -Filter 'LabSuite-v*-Setup.exe' | Select-Object -First 1
          $blockmap = Get-Item "$($installer.FullName).blockmap"
          $updateMetadata = Get-Item dist-packaged/latest.yml
          gh release create '${{ github.ref_name }}' `
            $installer.FullName `
            $blockmap.FullName `
            $updateMetadata.FullName `
            --title 'LabSuite ${{ github.ref_name }}' `
            --notes-file CHANGELOG.md

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: LabSuite-${{ github.ref_name }}-Windows
          path: |
            dist-packaged/LabSuite-v*-Setup.exe
            dist-packaged/LabSuite-v*-Setup.exe.blockmap
            dist-packaged/latest.yml
